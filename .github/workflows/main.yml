name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Find build output
        run: |
          echo "Files in project root:"
          ls -la
          echo "Possible output folders:"
          find . -maxdepth 2 -type d | sort

      - name: Determine output folder
        run: |
          if [ -d "dist" ]; then
            echo "OUTPUT_DIR=dist" >> $GITHUB_ENV
          elif [ -d "build" ]; then
            echo "OUTPUT_DIR=build" >> $GITHUB_ENV
          elif [ -d "out" ]; then
            echo "OUTPUT_DIR=out" >> $GITHUB_ENV
          else
            echo "No known build output folder found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.OUTPUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
